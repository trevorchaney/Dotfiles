# External left (Dell P3223DE) — directly connected to laptop via DP-2
monitor = DP-2, 2560x1440@60, 0x0, 1

# External right (Dell G3223Q) — connected via Anker USB-C hub on DP-4
# This monitor supports 4K (3840x2160) but that resolution caused blinking through the hub.
# The hub doesn't have enough bandwidth to carry 4K@60Hz reliably on Linux.
# 2560x1440@60Hz is stable and gives the same logical resolution that 4K@1.5x scale did.
# Do not raise resolution back to 4K unless the monitor is directly connected to the laptop.
monitor = DP-4, 2560x1440@60, 2560x0, 1

# Laptop display (bottom-left, below DP-2)
monitor = eDP-1, 1920x1200@60, 0x1440, 1

# Fallback for any unrecognised monitor
monitor = , preferred, auto, 1
