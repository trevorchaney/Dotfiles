# Monitor
source = ~/.config/hypr/monitors.conf

# Screenshots
env = SCREENSHOT_DIR,/home/tlc/pars/resources/images
env = PATH,/home/tlc/.local/bin:/home/tlc/.local/share/omarchy/bin:/usr/local/sbin:/usr/local/bin:/usr/bin

# Nvidia env vars
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct

# Autostart
exec-once = waybar
exec-once = mako
exec-once = hypridle

# Input
source = ~/.config/hypr/input.conf

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

# Decoration
decoration {
    rounding = 10
}

# Sources
source = ~/.config/omarchy/current/theme/hyprland.conf

# Keybindings
$mod = SUPER

bind = $mod, Return, exec, ghostty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, D, exec, wofi --show drun
bind = $mod, F, fullscreen
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media playback
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Display
bindl = , XF86Display, exec, hyprctl keyword monitor eDP-1,toggle

# Lid switch — disable laptop screen when closed if externals are connected
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/lid.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid.sh open

# Keyboard backlight
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d *::kbd_backlight set +10%
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d *::kbd_backlight set 10%-

# Screenshots
bind = , Print, exec, /home/tlc/.local/bin/screenshot
bind = SHIFT, Print, exec, /home/tlc/.local/bin/screenshot
bind = SUPER SHIFT, S, exec, /home/tlc/.local/bin/screenshot

# Search key (F12 on XPS)
bind = , XF86Search, exec, wofi --show drun

# Lock screen
bind = SUPER CTRL, L, exec, omarchy-lock-screen
bind = SUPER ALT, L, exec, systemctl suspend
